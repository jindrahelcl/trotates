<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-client-id" content="837226827485-olv57cib909dfntcq77ienj46inq3hus.apps.googleusercontent.com">
  <title>Map Rotator</title>
  <link rel="stylesheet" href="/theme.css">
  <link rel="stylesheet" href="/style.css">
  <script src="https://accounts.google.com/gsi/client" async></script>
</head>
<body>
  <header>
    <h1><a href="/" class="logo">Map<span>Rotator</span></a></h1>
    <div class="controls">
      <label class="free-play-only">W <input type="number" id="cfg-width" value="4" min="1" max="20"></label>
      <label class="free-play-only">H <input type="number" id="cfg-height" value="4" min="1" max="20"></label>
      <label class="free-play-only">Zoom <input type="number" id="cfg-zoom" value="15" min="5" max="19"></label>
      <input type="text" id="cfg-nickname" style="display:none" maxlength="20" autocomplete="off">
      <div class="player-widget">
        <span id="nick-display" class="nick-display"></span>
        <button id="account-btn" class="account-btn" title="Account">⚙</button>
      </div>
      <label class="nightmare-label free-play-only"><input type="checkbox" id="cfg-nightmare"> Nightmare</label>
      <label class="free-play-only"><input type="checkbox" id="cfg-ranked"> Ranked</label>
      <label class="free-play-only"><input type="checkbox" id="cfg-hell"> Hell</label>
      <span id="timer">0:00</span>
      <span id="moves">Moves: 0</span>
      <span id="campaign-indicator" class="hidden"></span>
      <button id="new-game-btn">New Game</button>
      <button id="campaign-btn">Campaign</button>
    </div>
  </header>

  <main>
    <div id="grid"></div>
  </main>

  <p id="attribution">
    <a href="https://mapy.com/" target="_blank" rel="noopener">
      <img src="https://api.mapy.com/img/api/logo.svg" alt="Mapy.com" height="30">
    </a>
    <a href="https://api.mapy.com/copyright" target="_blank" rel="noopener">Seznam.cz a.s. a další</a>
  </p>

  <section id="leaderboard">
    <div class="lb-tabs">
      <button class="lb-tab active" data-tab="location">This Location</button>
      <button class="lb-tab" data-tab="global">Global</button>
      <button class="lb-tab" data-tab="campaign">Campaign</button>
    </div>
    <div id="lb-location" class="lb-panel">
      <table id="lb-table">
        <thead>
          <tr><th>#</th><th>Player</th><th>Time</th><th>Moves</th><th class="lb-col-date">Date</th></tr>
        </thead>
        <tbody id="lb-body">
          <tr><td colspan="5" class="lb-empty">No solves yet for this location</td></tr>
        </tbody>
        <tfoot id="lb-foot"></tfoot>
      </table>
    </div>
    <div id="lb-global" class="lb-panel hidden">
      <table id="lb-global-table">
        <thead>
          <tr><th>#</th><th>Player</th><th>Wins</th></tr>
        </thead>
        <tbody id="lb-global-body">
          <tr><td colspan="3" class="lb-empty">No wins yet</td></tr>
        </tbody>
      </table>
    </div>
    <div id="lb-campaign" class="lb-panel hidden">
      <table id="lb-campaign-table">
        <thead>
          <tr><th>#</th><th>Level</th><th>Player</th><th>Time</th><th>Moves</th></tr>
        </thead>
        <tbody id="lb-campaign-body">
          <tr><td colspan="5" class="lb-empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <div id="campaign-overlay" class="overlay hidden">
    <div class="overlay-box campaign-box">
      <h2 id="campaign-title"></h2>
      <div id="campaign-map"></div>
      <div id="campaign-levels"></div>
      <div class="campaign-buttons">
        <button id="campaign-start-btn">Continue</button>
        <button id="campaign-exit-btn">Exit Campaign</button>
      </div>
    </div>
  </div>

  <div id="intro-overlay" class="overlay hidden">
    <div class="overlay-box">
      <h2 id="intro-title"></h2>
      <p id="intro-text"></p>
      <button id="intro-start-btn">Start</button>
    </div>
  </div>

  <div id="win-overlay" class="overlay hidden">
    <div class="overlay-box">
      <h2>Puzzle Solved!</h2>
      <p id="win-stats"></p>
      <a id="mapy-link" href="#" target="_blank" class="mapy-link">View on mapy.com</a>
      <button id="share-btn" class="share-btn">Copy challenge link</button>
      <div id="anon-prompt" class="anon-prompt hidden">
        Score not saved — <button id="anon-save-btn" class="anon-account-btn">Create account</button> to save it.
      </div>
      <p id="campaign-outro" class="campaign-outro" style="display:none"></p>
      <button id="campaign-map-btn" class="share-btn" style="display:none">Campaign Map</button>
      <div class="win-buttons">
        <button id="admire-btn">Admire</button>
        <button id="play-again-btn">Play Again</button>
        <button id="campaign-next-btn" style="display:none">Next Level →</button>
      </div>
    </div>
  </div>

  <!-- Auth / Account modal -->
  <div id="account-overlay" class="overlay hidden">
    <div class="overlay-box">
      <button id="account-close-btn" class="overlay-close-btn">✕</button>

      <!-- Shown when not logged in -->
      <div id="auth-panel">
        <h2>Sign In</h2>
        <div class="auth-tabs">
          <button class="auth-tab active" data-auth-tab="login">Login</button>
          <button class="auth-tab" data-auth-tab="register">Register</button>
        </div>

        <div id="auth-login-tab">
          <div class="auth-form-group">
            <input type="email" id="auth-email" placeholder="Email" autocomplete="email">
          </div>
          <div class="auth-form-group">
            <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password">
          </div>
          <button id="auth-login-btn" class="auth-submit-btn">Sign in</button>
          <p id="auth-login-msg" class="account-msg" style="display:none"></p>
        </div>

        <div id="auth-register-tab" style="display:none">
          <div class="auth-form-group">
            <input type="text" id="auth-nickname" placeholder="Nickname" maxlength="20" autocomplete="off">
          </div>
          <div class="auth-form-group">
            <input type="email" id="auth-reg-email" placeholder="Email" autocomplete="email">
          </div>
          <div class="auth-form-group">
            <input type="password" id="auth-reg-password" placeholder="Password (min 8 chars)" autocomplete="new-password">
          </div>
          <button id="auth-register-btn" class="auth-submit-btn">Create account</button>
          <p id="auth-register-msg" class="account-msg" style="display:none"></p>
        </div>

        <div class="auth-divider"><span>or</span></div>
        <div id="google-signin-btn"></div>
        <button id="auth-skip-btn" class="auth-skip-btn">Play without account</button>
      </div>

      <!-- Shown when logged in -->
      <div id="account-panel" style="display:none">
        <h2>Account</h2>
        <p class="account-status">Signed in as <strong id="account-nickname-display"></strong></p>
        <button id="auth-signout-btn" class="auth-signout-btn">Sign out</button>
      </div>

    </div>
  </div>

  <script src="/game.js"></script>
</body>
</html>
