<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map Rotator</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>Map Rotator</h1>
    <div class="controls">
      <label>W <input type="number" id="cfg-width" value="4" min="1" max="20"></label>
      <label>H <input type="number" id="cfg-height" value="4" min="1" max="20"></label>
      <label>Zoom <input type="number" id="cfg-zoom" value="15" min="5" max="19"></label>
      <label>Player <input type="text" id="cfg-nickname" placeholder="your name" maxlength="20" autocomplete="off"></label>
      <label class="nightmare-label"><input type="checkbox" id="cfg-nightmare"> Nightmare</label>
      <label><input type="checkbox" id="cfg-ranked"> Ranked</label>
      <span id="timer">0:00</span>
      <span id="moves">Moves: 0</span>
      <button id="new-game-btn">New Game</button>
    </div>
  </header>

  <main>
    <div id="grid"></div>
  </main>

  <p id="attribution">
    <a href="https://mapy.com/" target="_blank" rel="noopener">
      <img src="https://api.mapy.com/img/api/logo.svg" alt="Mapy.com" height="30">
    </a>
    <a href="https://api.mapy.com/copyright" target="_blank" rel="noopener">Seznam.cz a.s. a další</a>
  </p>

  <section id="leaderboard">
    <div class="lb-tabs">
      <button class="lb-tab active" data-tab="location">This Location</button>
      <button class="lb-tab" data-tab="global">Global</button>
    </div>
    <div id="lb-location" class="lb-panel">
      <table id="lb-table">
        <thead>
          <tr><th>#</th><th>Player</th><th>Time</th><th>Moves</th><th class="lb-col-date">Date</th></tr>
        </thead>
        <tbody id="lb-body">
          <tr><td colspan="5" class="lb-empty">No solves yet for this location</td></tr>
        </tbody>
        <tfoot id="lb-foot"></tfoot>
      </table>
    </div>
    <div id="lb-global" class="lb-panel hidden">
      <table id="lb-global-table">
        <thead>
          <tr><th>#</th><th>Player</th><th>Wins</th></tr>
        </thead>
        <tbody id="lb-global-body">
          <tr><td colspan="3" class="lb-empty">No wins yet</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <div id="win-overlay" class="overlay hidden">
    <div class="overlay-box">
      <h2>Puzzle Solved!</h2>
      <p id="win-stats"></p>
      <a id="mapy-link" href="#" target="_blank" class="mapy-link">View on mapy.com</a>
      <button id="share-btn" class="share-btn">Copy challenge link</button>
      <div id="anon-prompt" class="anon-prompt hidden">
        Playing as anonymous —
        <input type="text" id="anon-name" placeholder="your name" maxlength="20" autocomplete="off">
        <button id="anon-save-btn">Save</button>
      </div>
      <div class="win-buttons">
        <button id="admire-btn">Admire</button>
        <button id="play-again-btn">Play Again</button>
      </div>
    </div>
  </div>

  <script src="/game.js"></script>
</body>
</html>
